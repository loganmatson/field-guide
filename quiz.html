<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#FFF6E6">
<title>Find Your Setup · A Field Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFF6E6; --bg-2:#FFEFD6; --card:#FFFFFF;
    --ink:#3A2E22; --ink-soft:#7A6A55; --ink-faint:#B0A28C;
    --sun:#FFB23E; --sun-deep:#F58A1F; --berry:#E8576B; --grape:#7C5CFF;
    --teal:#1FA98F; --sky:#3FA9F5;
    --hair:rgba(58,46,34,.10); --hair-2:rgba(58,46,34,.18);
    --serif:'Fraunces',Georgia,serif; --sans:'Plus Jakarta Sans',-apple-system,system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,monospace;
    --maxw:760px;
    --shadow:0 18px 50px -22px rgba(245,138,31,.55);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:radial-gradient(ellipse 120% 80% at 50% -10%,var(--bg-2),var(--bg));color:var(--ink);line-height:1.55;font-size:17px;-webkit-font-smoothing:antialiased;min-height:100vh}
  .blob{position:fixed;border-radius:50%;filter:blur(10px);pointer-events:none;z-index:0;opacity:.4}
  .blob1{width:40vw;height:40vw;background:radial-gradient(circle,var(--sun) 0%,transparent 68%);top:-14vw;right:-10vw}
  .blob2{width:34vw;height:34vw;background:radial-gradient(circle,var(--berry) 0%,transparent 70%);bottom:-12vw;left:-12vw;opacity:.22}

  /* shared field-guide nav */
  nav.fg{position:relative;z-index:5;max-width:var(--maxw);margin:0 auto;padding:22px 24px 0;display:flex;gap:6px 18px;flex-wrap:wrap;align-items:center;font-family:var(--mono);font-size:12px;letter-spacing:.04em}
  nav.fg .home{font-weight:600;color:var(--ink);text-decoration:none;display:flex;align-items:center;gap:8px}
  nav.fg .home .dot{width:9px;height:9px;border-radius:50%;background:var(--sun-deep)}
  nav.fg .sep{flex:1}
  nav.fg a.link{color:var(--ink-soft);text-decoration:none;transition:color .18s}
  nav.fg a.link:hover{color:var(--sun-deep)}

  .wrap{position:relative;z-index:2;max-width:var(--maxw);margin:0 auto;padding:30px 24px 70px}

  header.hero{text-align:center;padding:26px 0 18px}
  .kick{font-family:var(--mono);font-size:11.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--sun-deep);margin-bottom:16px;font-weight:500}
  h1{font-family:var(--serif);font-weight:600;letter-spacing:-.025em;line-height:1.02;font-size:clamp(2.3rem,6.5vw,3.6rem)}
  h1 .accent{color:var(--sun-deep)}
  .lede{margin:16px auto 0;max-width:520px;color:var(--ink-soft);font-size:18px}

  /* progress */
  .progress-wrap{max-width:480px;margin:30px auto 0;display:flex;align-items:center;gap:14px}
  .progress-track{flex:1;height:10px;background:var(--bg-2);border-radius:99px;overflow:hidden;box-shadow:inset 0 1px 3px rgba(58,46,34,.12)}
  .progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--sun),var(--sun-deep));border-radius:99px;transition:width .45s cubic-bezier(.4,1.3,.5,1)}
  .progress-label{font-family:var(--mono);font-size:12px;color:var(--ink-soft);white-space:nowrap}

  /* question card */
  .stage{margin-top:30px}
  .qcard{background:var(--card);border:1px solid var(--hair);border-radius:26px;padding:34px 30px;box-shadow:var(--shadow);animation:pop .42s cubic-bezier(.34,1.56,.5,1)}
  @keyframes pop{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}
  .qnum{font-family:var(--mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--sun-deep);margin-bottom:10px}
  .qtext{font-family:var(--serif);font-weight:600;font-size:clamp(1.5rem,3.6vw,2rem);line-height:1.12;letter-spacing:-.02em;margin-bottom:24px}
  .options{display:grid;gap:13px}
  .opt{display:flex;align-items:center;gap:15px;text-align:left;width:100%;background:var(--bg);border:2px solid var(--hair);border-radius:18px;padding:17px 19px;cursor:pointer;font-family:var(--sans);font-size:16.5px;color:var(--ink);transition:transform .16s,border-color .16s,background .16s,box-shadow .16s}
  .opt:hover{transform:translateY(-2px);border-color:var(--sun);box-shadow:0 12px 26px -16px var(--sun-deep)}
  .opt .emoji{font-size:26px;line-height:1;flex-shrink:0}
  .opt.sel{border-color:var(--sun-deep);background:linear-gradient(180deg,#FFF,#FFF7EA);box-shadow:0 14px 30px -16px var(--sun-deep)}
  .opt .lab{font-weight:500}

  .qfoot{display:flex;justify-content:space-between;align-items:center;margin-top:26px;gap:14px}
  .btn{font-family:var(--sans);font-weight:700;font-size:16px;border:none;border-radius:14px;padding:14px 26px;cursor:pointer;transition:transform .16s,box-shadow .16s,opacity .16s}
  .btn-primary{background:linear-gradient(180deg,var(--sun),var(--sun-deep));color:#fff;box-shadow:0 12px 26px -12px var(--sun-deep)}
  .btn-primary:hover:not(:disabled){transform:translateY(-2px)}
  .btn-primary:disabled{opacity:.42;cursor:not-allowed}
  .btn-ghost{background:transparent;color:var(--ink-soft);padding:14px 8px}
  .btn-ghost:hover{color:var(--ink)}
  .btn-ghost:disabled{opacity:0;pointer-events:none}

  /* result */
  .result{animation:pop .5s cubic-bezier(.34,1.56,.5,1)}
  .result .crown{text-align:center;font-size:64px;line-height:1;margin-bottom:6px;animation:bounce .8s ease}
  @keyframes bounce{0%{transform:scale(0) rotate(-12deg)}55%{transform:scale(1.18) rotate(6deg)}100%{transform:scale(1) rotate(0)}}
  .result .verdict{text-align:center;font-family:var(--mono);font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--sun-deep);margin-bottom:8px}
  .result h2{text-align:center;font-family:var(--serif);font-weight:600;font-size:clamp(1.9rem,5vw,2.8rem);line-height:1.05;letter-spacing:-.025em;margin-bottom:12px}
  .result .sub{text-align:center;color:var(--ink-soft);max-width:480px;margin:0 auto 28px;font-size:17.5px}

  .path-grid{display:grid;gap:16px}
  .path-card{display:block;text-decoration:none;color:inherit;background:var(--card);border:2px solid var(--hair);border-radius:22px;padding:24px 24px 22px;position:relative;transition:transform .2s,border-color .2s,box-shadow .2s;overflow:hidden}
  .path-card:hover{transform:translateY(-4px);box-shadow:0 24px 50px -24px rgba(58,46,34,.4)}
  .path-card .ribbon{position:absolute;top:14px;right:-34px;transform:rotate(38deg);background:var(--sun-deep);color:#fff;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:4px 40px;font-weight:600}
  .path-card.cowork{border-color:color-mix(in srgb,var(--teal) 50%,transparent)}
  .path-card.cowork:hover{border-color:var(--teal)}
  .path-card.code{border-color:color-mix(in srgb,var(--grape) 50%,transparent)}
  .path-card.code:hover{border-color:var(--grape)}
  .path-card.best{box-shadow:0 0 0 3px color-mix(in srgb,var(--sun) 55%,transparent),0 20px 44px -22px var(--sun-deep)}
  .path-card .picon{font-size:38px;line-height:1;margin-bottom:14px}
  .path-card .ptag{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:8px}
  .path-card.cowork .ptag{color:var(--teal)}
  .path-card.code .ptag{color:var(--grape)}
  .path-card h3{font-family:var(--serif);font-weight:600;font-size:23px;letter-spacing:-.02em;margin-bottom:7px}
  .path-card p{color:var(--ink-soft);font-size:14.5px;line-height:1.5}
  .path-card .go{display:inline-flex;align-items:center;gap:7px;margin-top:16px;font-weight:700;font-size:14.5px}
  .path-card.cowork .go{color:var(--teal)}
  .path-card.code .go{color:var(--grape)}
  .path-card .go::after{content:"→";transition:transform .2s}
  .path-card:hover .go::after{transform:translateX(4px)}

  .chat-note{background:linear-gradient(180deg,#fff,#FFF7EA);border:2px dashed var(--hair-2);border-radius:20px;padding:22px 24px;text-align:center}
  .chat-note .ci{font-size:34px}
  .chat-note h3{font-family:var(--serif);font-weight:600;font-size:21px;margin:8px 0 6px}
  .chat-note p{color:var(--ink-soft);font-size:15px;max-width:420px;margin:0 auto 16px}
  .chat-note a.cta{display:inline-block;background:var(--ink);color:#fff;text-decoration:none;font-weight:700;font-size:15px;padding:12px 24px;border-radius:13px;transition:transform .16s}
  .chat-note a.cta:hover{transform:translateY(-2px)}

  .retake{display:block;margin:26px auto 0;background:none;border:none;color:var(--ink-soft);font-family:var(--mono);font-size:12.5px;letter-spacing:.04em;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
  .retake:hover{color:var(--sun-deep)}

  footer{max-width:var(--maxw);margin:0 auto;padding:24px;color:var(--ink-faint);font-family:var(--mono);font-size:12px;text-align:center}

  @media(max-width:560px){
    .qcard{padding:26px 20px;border-radius:22px}
    nav.fg{font-size:11px}
  }
</style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<nav class="fg">
  <a class="home" href="home.html"><span class="dot"></span>Field Guide</a>
  <span class="sep"></span>
  <a class="link" href="index.html">Why</a>
  <a class="link" href="business.html">Build</a>
  <a class="link" href="cheatsheet.html">Cheat Sheet</a>
  <a class="link" href="build-menu.html">Build Menu</a>
</nav>

<div class="wrap">
  <header class="hero">
    <div class="kick">Part 02 · Find Your Setup</div>
    <h1>Which Claude setup is <span class="accent">right for you?</span></h1>
    <p class="lede">Five quick questions. No accounts, no jargon. We'll point you to the exact guide built for how you want to work.</p>
  </header>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">1 / 5</div>
  </div>

  <div class="stage" id="stage"></div>
</div>

<footer>A Field Guide · an unlisted companion to our session</footer>

<script>
/* ---- Quiz data. Each option adds points to buckets: cowork / code / chat ---- */
const QUESTIONS = [
  {
    q: "Who are you setting Claude up for?",
    opts: [
      { emoji:"🧑‍💻", lab:"Just me",                       s:{code:2, chat:1} },
      { emoji:"👥", lab:"My team or whole company",               s:{cowork:3} },
      { emoji:"🤔", lab:"Not sure yet — exploring",               s:{chat:2, cowork:1} },
    ]
  },
  {
    q: "Do you write or edit code?",
    opts: [
      { emoji:"⌨️", lab:"Yes, regularly — it's my job",          s:{code:3} },
      { emoji:"🌱", lab:"A little, or I'm learning",              s:{code:1, chat:1} },
      { emoji:"📝", lab:"No — I work in docs, email, spreadsheets",s:{cowork:2, chat:1} },
    ]
  },
  {
    q: "What's the first thing you'd want Claude to help with?",
    opts: [
      { emoji:"🏗️", lab:"Building or fixing software",           s:{code:3} },
      { emoji:"🗂️", lab:"Team workflows — reviewing, drafting, organizing", s:{cowork:3} },
      { emoji:"💬", lab:"Quick questions and writing help",       s:{chat:3} },
    ]
  },
  {
    q: "Does more than one person need the same setup?",
    opts: [
      { emoji:"🤝", lab:"Yes — shared skills, shared knowledge",  s:{cowork:3} },
      { emoji:"🙋", lab:"No — it's just my own workspace",         s:{code:2, chat:1} },
      { emoji:"📈", lab:"Maybe later, as we grow",                s:{cowork:1, chat:1} },
    ]
  },
  {
    q: "How do you feel about the command line (the “terminal”)?",
    opts: [
      { emoji:"😎", lab:"Comfortable — I live in the terminal",    s:{code:3} },
      { emoji:"😅", lab:"Willing to learn if it's worth it",      s:{code:1, cowork:1} },
      { emoji:"🚫", lab:"I'd rather avoid it entirely",           s:{cowork:2, chat:1} },
    ]
  },
];

const PATHS = {
  cowork: {
    icon:"🏢", tag:"Team Workspace", title:"Claude CoWork",
    href:"cowork.html",
    blurb:"Set Claude up for a whole team — shared skills, shared memory, and admin controls. No terminal required.",
    cls:"cowork"
  },
  code: {
    icon:"⚡", tag:"Developer Setup", title:"Claude Code",
    href:"claude-code.html",
    blurb:"Claude that lives in your codebase — installs in the terminal, plugs into VS Code and GitHub, writes and runs real code.",
    cls:"code"
  }
};

let current = 0;
const answers = new Array(QUESTIONS.length).fill(null);
const stage = document.getElementById('stage');
const fill = document.getElementById('progressFill');
const plabel = document.getElementById('progressLabel');
const pwrap = document.getElementById('progressWrap');

function setProgress(){
  const pct = (current / QUESTIONS.length) * 100;
  fill.style.width = pct + "%";
  plabel.textContent = Math.min(current+1, QUESTIONS.length) + " / " + QUESTIONS.length;
}

function renderQuestion(){
  pwrap.style.display = "flex";
  setProgress();
  const Q = QUESTIONS[current];
  const card = document.createElement('div');
  card.className = 'qcard';

  const num = document.createElement('div');
  num.className = 'qnum';
  num.textContent = "Question " + (current+1);
  card.appendChild(num);

  const qt = document.createElement('div');
  qt.className = 'qtext';
  qt.textContent = Q.q;
  card.appendChild(qt);

  const opts = document.createElement('div');
  opts.className = 'options';
  Q.opts.forEach((o, i) => {
    const b = document.createElement('button');
    b.className = 'opt' + (answers[current] === i ? ' sel' : '');
    b.type = 'button';
    const em = document.createElement('span'); em.className='emoji'; em.textContent = o.emoji;
    const lab = document.createElement('span'); lab.className='lab'; lab.textContent = o.lab;
    b.appendChild(em); b.appendChild(lab);
    b.addEventListener('click', () => {
      answers[current] = i;
      opts.querySelectorAll('.opt').forEach(el => el.classList.remove('sel'));
      b.classList.add('sel');
      nextBtn.disabled = false;
    });
    opts.appendChild(b);
  });
  card.appendChild(opts);

  const foot = document.createElement('div');
  foot.className = 'qfoot';
  const back = document.createElement('button');
  back.className = 'btn btn-ghost';
  back.type = 'button';
  back.textContent = '← Back';
  back.disabled = current === 0;
  back.addEventListener('click', () => { current--; render(); });

  const nextBtn = document.createElement('button');
  nextBtn.className = 'btn btn-primary';
  nextBtn.type = 'button';
  nextBtn.textContent = current === QUESTIONS.length - 1 ? 'See my result ✨' : 'Next →';
  nextBtn.disabled = answers[current] === null;
  nextBtn.addEventListener('click', () => {
    if (current === QUESTIONS.length - 1){ current++; render(); }
    else { current++; render(); }
  });

  foot.appendChild(back);
  foot.appendChild(nextBtn);
  card.appendChild(foot);

  stage.innerHTML = '';
  stage.appendChild(card);
}

function tally(){
  const score = { cowork:0, code:0, chat:0 };
  answers.forEach((ai, qi) => {
    if (ai === null) return;
    const s = QUESTIONS[qi].opts[ai].s;
    for (const k in s) score[k] += s[k];
  });
  return score;
}

function buildPathCard(key, isBest){
  const p = PATHS[key];
  const a = document.createElement('a');
  a.className = 'path-card ' + p.cls + (isBest ? ' best' : '');
  a.href = p.href;
  if (isBest){
    const r = document.createElement('div'); r.className='ribbon'; r.textContent='Best match';
    a.appendChild(r);
  }
  const ic = document.createElement('div'); ic.className='picon'; ic.textContent = p.icon; a.appendChild(ic);
  const tg = document.createElement('div'); tg.className='ptag'; tg.textContent = p.tag; a.appendChild(tg);
  const h = document.createElement('h3'); h.textContent = p.title; a.appendChild(h);
  const pp = document.createElement('p'); pp.textContent = p.blurb; a.appendChild(pp);
  const go = document.createElement('span'); go.className='go'; go.textContent = 'Open the guide '; a.appendChild(go);
  return a;
}

function renderResult(){
  pwrap.style.display = "none";
  fill.style.width = "100%";
  const score = tally();

  const res = document.createElement('div');
  res.className = 'result';

  // chat-only dominant?
  const max = Math.max(score.cowork, score.code, score.chat);
  const chatWins = score.chat === max && score.chat > score.cowork && score.chat > score.code;

  if (chatWins){
    res.innerHTML = `
      <div class="crown">💬</div>
      <div class="verdict">Your result</div>
      <h2>Start simple — just chat</h2>
      <p class="sub">It sounds like you mostly want quick answers and writing help. You don't need a full setup yet — an account at Claude.ai gets you going in seconds, free.</p>`;
    const note = document.createElement('div');
    note.className = 'chat-note';
    note.innerHTML = `
      <div class="ci">✨</div>
      <h3>Claude.ai is your fastest start</h3>
      <p>Sign up, start a conversation, and come back here any time you're ready to set up a team workspace or a developer environment.</p>
      <a class="cta" href="https://claude.ai" target="_blank" rel="noopener">Go to Claude.ai →</a>`;
    res.appendChild(note);
  } else {
    // cowork vs code; tie if within 1 point
    const cowork = score.cowork, code = score.code;
    const diff = Math.abs(cowork - code);
    const tie = diff <= 1;
    const primary = cowork >= code ? 'cowork' : 'code';
    const secondary = primary === 'cowork' ? 'code' : 'cowork';

    if (tie){
      res.innerHTML = `
        <div class="crown">🎯</div>
        <div class="verdict">Your result</div>
        <h2>You've got a foot in both worlds</h2>
        <p class="sub">Your answers point to both paths. We nudged the stronger match to the top — but either guide will set you up right. Pick the one that fits today; you can always come back for the other.</p>`;
      const grid = document.createElement('div'); grid.className='path-grid';
      grid.appendChild(buildPathCard(primary, true));
      grid.appendChild(buildPathCard(secondary, false));
      res.appendChild(grid);
    } else {
      const p = PATHS[primary];
      res.innerHTML = `
        <div class="crown">${p.icon}</div>
        <div class="verdict">Your result</div>
        <h2>${primary === 'cowork' ? 'Set up a team workspace' : 'Set up your developer environment'}</h2>
        <p class="sub">${primary === 'cowork'
          ? 'Your answers point to CoWork — the shared workspace built for teams. No terminal, no code. Here’s your step-by-step guide.'
          : 'Your answers point to Claude Code — the developer setup that lives in your terminal and codebase. Here’s your step-by-step guide.'}</p>`;
      const grid = document.createElement('div'); grid.className='path-grid';
      grid.appendChild(buildPathCard(primary, false));
      res.appendChild(grid);
    }
  }

  const retake = document.createElement('button');
  retake.className = 'retake';
  retake.type = 'button';
  retake.textContent = '↺ Retake the quiz';
  retake.addEventListener('click', () => {
    current = 0;
    answers.fill(null);
    render();
  });
  res.appendChild(retake);

  stage.innerHTML = '';
  stage.appendChild(res);
}

function render(){
  if (current >= QUESTIONS.length) renderResult();
  else renderQuestion();
}

render();
</script>
</body>
</html>
